spring:
  data:
  mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/apigateway}
  main:
    allow-bean-definition-overriding: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change_this_to_env_secret}
  exp-ms: ${JWT_EXP_MS:3600000}

ratelimit:
  capacity: ${RATE_LIMIT_CAPACITY:100}
  refillPerMinute: ${RATE_LIMIT_REFILL:100}


logging:
  level:
    root: INFO
    com.soumyajit.apigateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: alpha
    tagsSorter: alpha


app:
  name: api-gateway
  description: API Gateway for demo
  version: 0.0.1



